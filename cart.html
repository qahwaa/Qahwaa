<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">Qahwaa - قـهـوة</a>
    </header>

    <section class="cart-section">
        <h2 class="title cart-title"> 🛒 Shopping Cart</h2>
        <div class="cart-content">
            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product</th>
                        <th>Size</th>
                        <th>Color</th>
                        <th>Quantity</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>
            </div>
            <p id="total-cost">Total Cost: <span id="cost-value">0</span> LE (Shipping fees: 80 LE)</p>

            <div class="coupon-box">

    <input 
        type="text"
        id="coupon-input"
        placeholder="Enter Discount Code"
    >

    <button id="apply-coupon">
        Apply
    </button>

</div>

<p id="coupon-message"></p>

<p id="discount-row">
    Discount:
    <span id="discount-value">0</span> LE
</p>

            <button class="clear-cart">Clear Cart</button>
            <button class="continue-shopping" onclick="window.location.href='pro.html'">🛍️ Continue Shopping</button>
            
        </div>
    </section>
    
<div class="checkout-note">
🚚 Please fill your details carefully to receive your order faster
</div>

    <section class="order-section">
        <h2 class="title">📋 Enter Your Details</h2>
        <table class="order-table">
            <tr>
                <td>
    Full Name
    <span class="required">*</span>
</td>
                <td><input 
type="text"
id="full-name"
placeholder="Enter your full name"
required></td>
            </tr>
            <tr>
                <td>Phone Number:</td>
                <td><input 
type="tel"
id="phone-number"
placeholder="01xxxxxxxxx"
required></td>
            </tr>
            <tr>
                <td>Alternate Phone:</td>
                <td><input type="text" id="alt-phone" placeholder="Enter alternate phone number"></td>
            </tr>
            <tr>
                <td>Full Address:</td>
                <td><textarea
id="full-address"
placeholder="Enter your full address"
required>
</textarea></td>
            </tr>
            <tr>
                <td>Notes:</td>
                <td><textarea id="notes"></textarea></td>
            </tr>
            <tr>
                <td colspan="2">
                    <button id="submit-order" class="submit-order">Submit Order</button>
                </td>
            </tr>
        </table>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cartItemsContainer = document.getElementById("cart-items");
            const totalCostElement = document.getElementById("cost-value");

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

           const coupons = {
    QAHWAA10: { type: "percent", value: 10 },
    HP50: { type: "fixed", value: 50 },
    COFFEE20: { type: "percent", value: 20 }
};

let discountPercent = 0;
let fixedDiscount = 0;

            function calculateTotal() {

    let subtotal = cart.reduce((sum, item) => {
    return sum + (Number(item.price) || 0) * (Number(item.quantity) || 1);
}, 0);

    let shipping = 80;

    let percentDiscountAmount =
        subtotal * (discountPercent / 100);

    let totalDiscount =
    Number(percentDiscountAmount) + Number(fixedDiscount);

    let finalTotal =
    Number(subtotal) + Number(shipping) - Number(totalDiscount);

    if (finalTotal < 0) {
        finalTotal = 0;
    }

    totalCostElement.textContent =
        finalTotal + " ";

    document.getElementById("discount-value")
        .textContent = totalDiscount + " ";
}

    

            function renderCart() {
                cartItemsContainer.innerHTML = "";
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = `<tr><td colspan="6">🛒 سلة التسوق فارغة</td></tr>`;
                    totalCostElement.textContent = "0";
                    return;
                }

                cart.forEach((item, index) => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td><img src="${item.image}" width="50"></td>
                        <td>${item.name}</td>
                        <td>${item.size}</td>
                        <td>${item.color}</td>
                        <td>
                            <select class="quantity" data-index="${index}">
                                ${[1, 2, 3, 4, 5].map(q => `<option value="${q}" ${q == item.quantity ? "selected" : ""}>${q}</option>`).join("")}
                            </select>
                        </td>
                        <td><button class="remove-item" data-index="${index}">❌</button></td>
                    `;
                    cartItemsContainer.appendChild(row);
                });

                document.querySelectorAll(".quantity").forEach(select => {
                    select.addEventListener("change", function () {
                        const index = this.getAttribute("data-index");
                        cart[index].quantity = Math.max(1, parseInt(this.value));
                        localStorage.setItem("cart", JSON.stringify(cart));
                        calculateTotal();
                        renderCart();
                    });
                });

                document.querySelectorAll(".remove-item").forEach(button => {
                    button.addEventListener("click", function () {
                        const index = this.getAttribute("data-index");
                        cart.splice(index, 1);
                        localStorage.setItem("cart", JSON.stringify(cart));
                        renderCart();
                        calculateTotal();
                    });
                });

                calculateTotal();
            }

            document.querySelector(".clear-cart").addEventListener("click", function () {
                if (confirm("Are you sure you want to clear the cart?")) {
                    localStorage.removeItem("cart");
                    cart = [];
                    renderCart();
                    calculateTotal();
                }
            });

            renderCart();

document.getElementById("apply-coupon")
.addEventListener("click", function () {

    const code = document
        .getElementById("coupon-input")
        .value
        .trim()
        .toUpperCase();

    const message =
        document.getElementById("coupon-message");

    discountPercent = 0;
    fixedDiscount = 0;

    if (coupons[code]) {

        if (coupons[code].type === "percent") {

            discountPercent = coupons[code].value;

            message.innerText =
                `✅ Coupon Applied (${discountPercent}% OFF)`;

        } else if (coupons[code].type === "fixed") {

            fixedDiscount = coupons[code].value;

            message.innerText =
                `✅ Coupon Applied (${fixedDiscount} LE OFF)`;
        }

    } else {

        message.innerText =
            "❌ Invalid Coupon Code";
    }

    calculateTotal();
});

        document.getElementById("submit-order").addEventListener("click", function () {
            const fullName = document.getElementById("full-name").value.trim();
            const phoneNumber = document.getElementById("phone-number").value.trim();
            const altPhone = document.getElementById("alt-phone").value.trim();
            const fullAddress = document.getElementById("full-address").value.trim();
            const notes = document.getElementById("notes").value.trim();
            const costValue = document.getElementById("cost-value").innerText;

            let cartItems = [];
            document.querySelectorAll("#cart-items tr").forEach(row => {
                let product = row.cells[1]?.innerText || "";
                let size = row.cells[2]?.innerText || "";
                let color = row.cells[3]?.innerText || "";
                let quantity = row.cells[4]?.querySelector("select")?.value || "1";
                cartItems.push(`- ${product} | Size: ${size} | Color: ${color} | Quantity: ${quantity}`);
            });

            if (!fullName || !phoneNumber || !fullAddress || cartItems.length === 0) {
                alert("⚠️ الرجاء ملء جميع الحقول المطلوبة وإضافة منتج واحد على الأقل.");
                return;
            }

            if(fullName.length < 2){

    alert("Please enter your full name");

    return;
}

if(phoneNumber.length < 11){

    alert("Enter a valid phone number ⚠️");

    return;
}



            const message = `📌 *طلب جديد* 🚀\n👤 *الاسم:* ${fullName}\n📞 *رقم الهاتف:* ${phoneNumber}\n📞 *هاتف إضافي:* ${altPhone}\n🏡 *العنوان:* ${fullAddress}\n📝 *ملاحظات:* ${notes}\n💰 *التكلفة النهائية:* ${costValue} LE\n🛍️ *المشتريات:*\n${cartItems.join("\n")}`;

            const botToken = "8018297376:AAFfMQKUgCxxC_iMjtCjEGktvw4dga37GSw";
            const chatId = "-1002645802522";

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: "Markdown"
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    alert("✅ order sent successfully!");
                    localStorage.removeItem("cart");
                    location.reload();
                } else {
                    alert("❌ error sending order. Please try again.");
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("❌An error occurred while sending the order. Please try again.");
            });
        });
        });
    </script>
</body>
</html>
