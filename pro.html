<script>

function filterProducts(){

    let fitValue = document.getElementById("fitFilter").value;
    let priceValue = document.getElementById("priceFilter").value;

    let products = document.querySelectorAll(".product");

    products.forEach(product => {

        let fit = product.dataset.fit;
        let price = product.dataset.price;

        let fitMatch =
            fitValue === "all" || fit === fitValue;

        let priceMatch =
            priceValue === "all" || price === priceValue;

        if(fitMatch && priceMatch){
            product.style.display = "block";
        }else{
            product.style.display = "none";
        }

    });
}

</script>
