    <script>
        let images = ["img/ff22.jpg", "img/ffb.jpg", "img/basic2.jpg"];
        let index = 0;

        function nextSlide() {
            index = (index + 1) % images.length;
            document.getElementById("productImage").src = images[index];

        function addToCart() {
            let size = document.getElementById("size").value;

                price: 450,
                size: size,

                quantity: quantity,

            };
