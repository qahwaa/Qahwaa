<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dive In space</title>
    <link rel="stylesheet" href="about1.css">
</head>
<body>
    <header>
        <h3>Dive In space</h3>
        <a href="index.html" class="home-link">🏠</a>
    </header>

    <section class="product-details">
        
        <div class="slider">
            <button class="prev" onclick="prevSlide()">&#10094;</button>
            <img id="productImage" src="img/bund.png" alt="Dive In space">
            <button class="next" onclick="nextSlide()">&#10095;</button>
        </div>

        
        <h2>Product Details</h2>
        <p>Bundle containing 2 T-shirts (box-fit and oversized) made of high-quality materials and very comfortable</p>
        <p>model wearing black T-shirt hight 183cm and weight 68kg ,wear Medium size</p>
        <p>Price: 950 L.E</p>
        <span class="discount-tag">25% OFF</span>

        <div class="options">
            
            <div class="options">

    <!-- Oversize Design -->
    <div class="option-group">
        <label>Oversize Design:</label>

        <select id="oversize-design">
            <option>ZAZA BASHA</option>
            <option>هنا القاهرة</option>
        </select>
    </div>

    <!-- Oversize Size -->
    <div class="option-group">
        <label>Oversize Size:</label>

        <select id="oversize-size">
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>
    </div>

    <!-- Box Fit Color -->
    <div class="option-group">
        <label>Box-Fit Color:</label>

        <select id="box-color">
            <option>White</option>
            <option>Black</option>
        </select>
    </div>

    <!-- Box Fit Size -->
    <div class="option-group">
        <label>Box-Fit Size:</label>

        <select id="box-size">
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>
    </div>

    
   

</div>
        
       
        <button class="add-to-cart" onclick="addBundleToCart()">
    Add Bundle To Cart
</button>

       
        <a href="cart.html" class="go-to-cart">Cart 🛒</a>
    </section>

  
    <div class="back-button-container">
        <a href="pro.html" class="back-button">Continue Shopping 🤳🏻</a>
    </div>

   <script>

function addBundleToCart() {

    const oversizeDesign =
        document.getElementById("oversize-design").value;

    const oversizeSize =
        document.getElementById("oversize-size").value;

    const boxColor =
        document.getElementById("box-color").value;

    const boxSize =
        document.getElementById("box-size").value;

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({

        name: "Oversized Bundle",

        image: document.getElementById("productImage").src,

        size:
`Oversize Size: ${oversizeSize} | Box Size: ${boxSize}`,

        color:
`Design: ${oversizeDesign} | Box Color: ${boxColor}`,

        quantity: 1,

        price: 950,

        type: "bundle"
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("✅ Bundle Added!");

    window.location.href = "cart.html";
}

</script>
</body>
</html>
