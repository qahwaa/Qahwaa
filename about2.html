<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASIC (Box-fit) T-shirt </title>
    <link rel="stylesheet" href="about1.css">
</head>
<body>
    <header>
        <h3>BASIC (Box-fit) T-shirt </h3>
        <a href="index.html" class="home-link">🏠</a>
    </header>

    <section class="product-details">
        <!-- سلايدر الصور -->
        <div class="slider">
            <button class="prev" onclick="prevSlide()">&#10094;</button>
            <img id="productImage" src="img/kk22.jpg" alt="BASIC (Box-fit) T-shirt">
            <button class="next" onclick="nextSlide()">&#10095;</button>
        </div>

        <!-- تفاصيل المنتج -->
        <h2>Product Details</h2>
        <p>BASIC (Box-fit) T-shirt made of high-quality materials and very comfortable </p><p>
            model wearing black T-shirt hight 185cm and weight 95kg wear Large size
        </p>
        <p>Price: 499 L.E</p>
        <span class="discount-tag">15% OFF</span>


        <div class="options">
            <!-- ✅ اختيار المقاس -->
            <div class="option-group">
                <label for="size">Size:</label>
                <select id="size">
                   
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL </option>
                   
                </select>
            </div>
        
            <!-- ✅ اختيار اللون -->
            <div class="option-group">
                <label for="color">Color:</label>
                <select id="color">
                    <option>White</option>
                    <option>Black</option>
                    
                </select>
            </div>
        
            <!-- ✅ اختيار الكمية -->
            <div class="option-group">
                <label for="quantity">Quantity:</label>
                <select id="quantity">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </div>
        </div>
        
        <!-- زر الشراء -->
        <button class="add-to-cart" onclick="addToCart()">Add to Cart ➕</button>

        <!-- زر الذهاب إلى السلة -->
        <a href="cart.html" class="go-to-cart">Cart 🛒</a>
    </section>

    <!-- زر العودة للمتجر -->
    <div class="back-button-container">
        <a href="pro.html" class="back-button">Continue Shopping 🤳🏻</a>
    </div>

    <script>
        let images = ["img/kk22.jpg", "img/kkb.jpg", "img/basic4.jpg"  , "img/ov.PNG"];
        let index = 0;

        function nextSlide() {
            index = (index + 1) % images.length;
            document.getElementById("productImage").src = images[index];
        }

        function prevSlide() {
            index = (index - 1 + images.length) % images.length;
            document.getElementById("productImage").src = images[index];
        }

        function addToCart() {
            let size = document.getElementById("size").value;
            let color = document.getElementById("color").value;
            let quantity = document.getElementById("quantity").value;

            let product = {
                name: "BASIC (Box-fit) T-shirt",
                price: 499,
                size: size,
                color: color,
                quantity: quantity,
                image: images[0] // أول صورة كصورة المنتج الرئيسية
            };

            // جلب المنتجات من localStorage
            let cart = localStorage.getItem("cart") ? JSON.parse(localStorage.getItem("cart")) : [];

            // إضافة المنتج الجديد
            cart.push(product);

            // حفظ البيانات في localStorage
            localStorage.setItem("cart", JSON.stringify(cart));

            alert("✅ تمت إضافة المنتج إلى السلة!");
        }
    </script>
</body>
</html>
